<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="50%" style="stop-color:#0f0f2a"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect width="860" height="200" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#bannerClip)" opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="40" x2="860" y2="40"/>
    <line x1="0" y1="80" x2="860" y2="80"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Left neural network decoration -->
  <g clip-path="url(#bannerClip)">
    <!-- Nodes left -->
    <circle cx="40" cy="60" r="4" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
    <circle cx="80" cy="40" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="80" cy="80" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="40" cy="140" r="4" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
    <circle cx="80" cy="120" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="80" cy="160" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="20" cy="100" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="110" cy="60" r="3" fill="#06b6d4" opacity="0.5"/>
    <circle cx="110" cy="140" r="3" fill="#06b6d4" opacity="0.5"/>

    <!-- Connections left -->
    <line x1="40" y1="60" x2="80" y2="40" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="60" x2="80" y2="80" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="60" x2="20" y2="100" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
    <line x1="40" y1="140" x2="80" y2="120" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="140" x2="80" y2="160" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="140" x2="20" y2="100" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
    <line x1="80" y1="40" x2="110" y2="60" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="80" y1="80" x2="110" y2="60" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="80" y1="120" x2="110" y2="140" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="80" y1="160" x2="110" y2="140" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="80" y1="80" x2="80" y2="120" stroke="#3b82f6" stroke-width="0.6" opacity="0.25"/>

    <!-- Right neural decoration -->
    <circle cx="820" cy="60" r="4" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
    <circle cx="780" cy="40" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="780" cy="80" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="820" cy="140" r="4" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
    <circle cx="780" cy="120" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="780" cy="160" r="3.5" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.7"/>
    <circle cx="840" cy="100" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="750" cy="60" r="3" fill="#06b6d4" opacity="0.5"/>
    <circle cx="750" cy="140" r="3" fill="#06b6d4" opacity="0.5"/>

    <line x1="820" y1="60" x2="780" y2="40" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="820" y1="60" x2="780" y2="80" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="820" y1="60" x2="840" y2="100" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
    <line x1="820" y1="140" x2="780" y2="120" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="820" y1="140" x2="780" y2="160" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="820" y1="140" x2="840" y2="100" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
    <line x1="780" y1="40" x2="750" y2="60" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="780" y1="80" x2="750" y2="60" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="780" y1="120" x2="750" y2="140" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="780" y1="160" x2="750" y2="140" stroke="#06b6d4" stroke-width="0.6" opacity="0.3"/>
    <line x1="780" y1="80" x2="780" y2="120" stroke="#3b82f6" stroke-width="0.6" opacity="0.25"/>
  </g>

  <!-- Center glow pulse -->
  <circle cx="430" cy="100" r="90" fill="#7c3aed" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Logo icon (mini neural) -->
  <g transform="translate(175, 68)">
    <circle cx="0" cy="0" r="20" fill="#0f0f2a" stroke="url(#nodeGrad)" stroke-width="1"/>
    <circle cx="0" cy="0" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="-13" r="2.5" fill="url(#accentGrad)"/>
    <circle cx="0" cy="13" r="2.5" fill="url(#accentGrad)"/>
    <circle cx="-13" cy="0" r="2.5" fill="url(#accentGrad)"/>
    <circle cx="13" cy="0" r="2.5" fill="url(#accentGrad)"/>
    <circle cx="-9" cy="-9" r="2" fill="#7c3aed" opacity="0.8"/>
    <circle cx="9" cy="-9" r="2" fill="#7c3aed" opacity="0.8"/>
    <circle cx="-9" cy="9" r="2" fill="#7c3aed" opacity="0.8"/>
    <circle cx="9" cy="9" r="2" fill="#7c3aed" opacity="0.8"/>
    <line x1="0" y1="0" x2="0" y2="-13" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="13" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="-13" y2="0" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="13" y2="0" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="-9" y2="-9" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="9" y2="-9" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="-9" y2="9" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
    <line x1="0" y1="0" x2="9" y2="9" stroke="url(#nodeGrad)" stroke-width="0.8" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="215" y="88" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="42" font-weight="700" letter-spacing="-1" fill="url(#titleGrad)">monobrain</text>

  <!-- Subtitle -->
  <text x="216" y="116" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="400" letter-spacing="0.3" fill="#94a3b8">
    Enterprise AI Agent Orchestration for Claude Code
  </text>

  <!-- Divider line -->
  <line x1="216" y1="128" x2="654" y2="128" stroke="url(#nodeGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Tags row — pill widths sized to content + 16px padding each side -->
  <g font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" font-weight="500">
    <!-- "60+ agents" ~82px -->
    <rect x="216" y="137" width="86" height="20" rx="4" fill="#7c3aed" opacity="0.2"/>
    <text x="224" y="151" fill="#a78bfa">60+ agents</text>

    <!-- "MCP server" ~82px, gap 8 -->
    <rect x="310" y="137" width="84" height="20" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="318" y="151" fill="#60a5fa">MCP server</text>

    <!-- "self-learning" ~100px, gap 8 -->
    <rect x="402" y="137" width="100" height="20" rx="4" fill="#06b6d4" opacity="0.2"/>
    <text x="410" y="151" fill="#67e8f9">self-learning</text>

    <!-- "hive-mind" ~78px, gap 8 -->
    <rect x="510" y="137" width="78" height="20" rx="4" fill="#10b981" opacity="0.2"/>
    <text x="518" y="151" fill="#34d399">hive-mind</text>

    <!-- "v1.5.2" ~58px, gap 8 -->
    <rect x="596" y="137" width="58" height="20" rx="4" fill="#f59e0b" opacity="0.2"/>
    <text x="604" y="151" fill="#fbbf24">v1.5.2</text>
  </g>

  <!-- Border -->
  <rect width="860" height="200" rx="12" fill="none" stroke="url(#nodeGrad)" stroke-width="1" opacity="0.3"/>
</svg>
